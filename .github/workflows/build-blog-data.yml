name: Build blog data

on:
  push:
    branches:
      - master
    paths:
      - "blog/posts/**/*.md"
      - "blog/build-posts.js"
      - ".github/workflows/build-blog-data.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-blog-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build blog data
        run: node blog/build-posts.js

      - name: Commit generated blog data
        run: |
          if git diff --quiet -- blog/posts-data.js; then
            echo "blog/posts-data.js is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/posts-data.js
          git commit -m "Build blog data"
          git push
