<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jon Huml &bull; Blog</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #000000;
      --link: #0000ee;
      --visited: #551a8b;
      --accent: #ff00ff;
      --border: #000000;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "Times New Roman", Times, serif;
      font-size: 16px;
      line-height: 1.35;
    }

    .page {
      max-width: 760px;
      margin: 24px auto;
      padding: 12px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    h2 {
      margin: 0 0 4px 0;
      font-size: 22px;
    }

    hr {
      border: 0;
      border-top: 2px solid var(--border);
      margin: 14px 0;
    }

    .box {
      border: 2px solid var(--border);
      padding: 10px;
      background: #f7f7f7;
    }

    a:link { color: var(--link); }
    a:visited { color: var(--visited); }
    a:hover { background: #ffff00; }

    .nav {
      margin: 0 0 10px 0;
      padding: 0;
      list-style: none;
    }
    .nav li {
      display: inline;
      margin-right: 10px;
    }

    .mono {
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
    }

    .post-list {
      display: grid;
      gap: 12px;
    }

    .post-summary p {
      margin: 0 0 8px 0;
    }

    .post-date {
      margin: 0 0 8px 0;
    }

    .post-body h2,
    .post-body h3 {
      margin-bottom: 6px;
    }

    .post-body p {
      margin: 0 0 12px 0;
    }

    .post-body pre {
      border: 2px solid var(--border);
      padding: 8px;
      overflow: auto;
      background: #ffffff;
    }

    .post-body code {
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
    }

    .status {
      margin: 0;
    }

    [hidden] {
      display: none;
    }

    footer {
      margin-top: 14px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="page">
    <h1 id="page-title">Blog</h1>

    <ul class="nav" aria-label="Site links">
      <li><a href="index.html">Home</a></li>
      <li><a href="files/Jon_Huml_Resume.pdf">CV</a></li>
      <li><a href="projects.html">Research</a></li>
      <li><a href="gallery.html">Photos</a></li>
    </ul>

    <p id="page-subtitle" class="mono">Notes and occasional writeups.</p>

    <hr />

    <section id="post-list" class="post-list" aria-label="Blog posts">
      <p class="status mono">Loading posts...</p>
    </section>

    <article id="post-view" class="post-body box" hidden></article>

    <footer>
      <hr />
      <div id="footer-note" class="mono">
        Blog posts live in <code>blog/posts</code> as Markdown files with front matter.
      </div>
    </footer>
  </div>

  <script>
    const manifestPath = "blog/posts.json";
    const postsPath = "blog/posts/";

    const pageTitle = document.getElementById("page-title");
    const pageSubtitle = document.getElementById("page-subtitle");
    const postList = document.getElementById("post-list");
    const postView = document.getElementById("post-view");
    const footerNote = document.getElementById("footer-note");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function safeHref(value) {
      const href = String(value).trim();

      if (/^(https?:|mailto:|#|\/|\.\/|\.\.\/)/i.test(href)) {
        return escapeHtml(href);
      }

      return "#";
    }

    function renderInline(markdown) {
      let html = escapeHtml(markdown);

      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, href) => {
        return `<a href="${safeHref(href)}">${text}</a>`;
      });

      return html;
    }

    function slugFromFile(file) {
      return file.replace(/\.md$/i, "");
    }

    function parseFrontMatter(raw) {
      const match = raw.match(/^---\s*\n([\s\S]*?)\n---\s*\n?([\s\S]*)$/);

      if (!match) {
        return { metadata: {}, content: raw };
      }

      const metadata = {};

      match[1].split("\n").forEach((line) => {
        const separatorIndex = line.indexOf(":");

        if (separatorIndex === -1) {
          return;
        }

        const key = line.slice(0, separatorIndex).trim();
        let value = line.slice(separatorIndex + 1).trim();

        value = value.replace(/^["']|["']$/g, "");
        metadata[key] = value;
      });

      return { metadata, content: match[2].trim() };
    }

    function firstParagraph(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const paragraph = [];

      for (const line of lines) {
        const trimmed = line.trim();

        if (!trimmed) {
          if (paragraph.length) {
            break;
          }

          continue;
        }

        if (/^#{1,6}\s+/.test(trimmed)) {
          continue;
        }

        paragraph.push(trimmed);
      }

      return paragraph.join(" ");
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let paragraph = [];
      let list = [];
      let code = [];
      let inCodeBlock = false;

      function flushParagraph() {
        if (!paragraph.length) {
          return;
        }

        html.push(`<p>${renderInline(paragraph.join(" "))}</p>`);
        paragraph = [];
      }

      function flushList() {
        if (!list.length) {
          return;
        }

        html.push(`<ul>${list.map((item) => `<li>${renderInline(item)}</li>`).join("")}</ul>`);
        list = [];
      }

      for (const line of lines) {
        const trimmed = line.trim();

        if (trimmed.startsWith("```")) {
          if (inCodeBlock) {
            html.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
            code = [];
            inCodeBlock = false;
          } else {
            flushParagraph();
            flushList();
            inCodeBlock = true;
          }

          continue;
        }

        if (inCodeBlock) {
          code.push(line);
          continue;
        }

        if (!trimmed) {
          flushParagraph();
          flushList();
          continue;
        }

        const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);

        if (heading) {
          flushParagraph();
          flushList();

          const level = Math.min(heading[1].length + 1, 3);
          html.push(`<h${level}>${renderInline(heading[2])}</h${level}>`);
          continue;
        }

        const listItem = trimmed.match(/^[-*]\s+(.+)$/);

        if (listItem) {
          flushParagraph();
          list.push(listItem[1]);
          continue;
        }

        flushList();
        paragraph.push(trimmed);
      }

      flushParagraph();
      flushList();

      if (inCodeBlock) {
        html.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
      }

      return html.join("\n");
    }

    function formatDate(dateString) {
      const date = new Date(`${dateString}T00:00:00Z`);

      if (Number.isNaN(date.getTime())) {
        return dateString;
      }

      return date.toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric",
        timeZone: "UTC"
      });
    }

    async function loadPost(entry) {
      const response = await fetch(`${postsPath}${entry.file}`);

      if (!response.ok) {
        throw new Error(`Could not load ${entry.file}`);
      }

      const raw = await response.text();
      const { metadata, content } = parseFrontMatter(raw);
      const slug = entry.slug || metadata.slug || slugFromFile(entry.file);

      return {
        slug,
        title: metadata.title || slug,
        date: metadata.date || "",
        content,
        excerpt: firstParagraph(content)
      };
    }

    async function loadPosts() {
      const response = await fetch(manifestPath);

      if (!response.ok) {
        throw new Error("Could not load blog post manifest.");
      }

      const manifest = await response.json();
      const posts = await Promise.all(manifest.map(loadPost));

      return posts.sort((a, b) => new Date(`${b.date}T00:00:00Z`) - new Date(`${a.date}T00:00:00Z`));
    }

    function renderPostList(posts) {
      pageTitle.textContent = "Blog";
      pageSubtitle.textContent = "Notes and occasional writeups.";
      postView.hidden = true;
      postList.hidden = false;
      footerNote.innerHTML = 'Blog posts live in <code>blog/posts</code> as Markdown files with front matter.';

      if (!posts.length) {
        postList.innerHTML = '<p class="status">No posts yet.</p>';
        return;
      }

      postList.innerHTML = posts.map((post) => {
        const url = `blog.html?post=${encodeURIComponent(post.slug)}`;

        return `
          <article class="post-summary box">
            <h2><a href="${url}">${escapeHtml(post.title)}</a></h2>
            <p class="mono post-date">${escapeHtml(formatDate(post.date))}</p>
            <p>${renderInline(post.excerpt)}</p>
            <p><a href="${url}">Read more</a></p>
          </article>
        `;
      }).join("");
    }

    function renderSinglePost(post) {
      pageTitle.textContent = post.title;
      pageSubtitle.textContent = formatDate(post.date);
      postList.hidden = true;
      postView.hidden = false;
      postView.innerHTML = renderMarkdown(post.content);
      footerNote.innerHTML = '<a href="blog.html">Back to blog</a>';
      document.title = `${post.title} \u2022 Jon Huml`;
    }

    function renderError(error) {
      postView.hidden = true;
      postList.hidden = false;
      postList.innerHTML = `
        <section class="box">
          <p class="status">The blog posts could not be loaded.</p>
          <p class="mono">${escapeHtml(error.message)}</p>
        </section>
      `;
    }

    async function main() {
      try {
        const posts = await loadPosts();
        const postSlug = new URLSearchParams(window.location.search).get("post");

        if (postSlug) {
          const post = posts.find((candidate) => candidate.slug === postSlug);

          if (!post) {
            throw new Error(`No post found for "${postSlug}".`);
          }

          renderSinglePost(post);
          return;
        }

        renderPostList(posts);
      } catch (error) {
        renderError(error);
      }
    }

    main();
  </script>
</body>
</html>
