<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ page.title }} &bull; Jon Huml</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #000000;
      --link: #0000ee;
      --visited: #551a8b;
      --accent: #ff00ff;
      --border: #000000;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "Times New Roman", Times, serif;
      font-size: 16px;
      line-height: 1.35;
    }

    .page {
      max-width: 760px;
      margin: 24px auto;
      padding: 12px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    hr {
      border: 0;
      border-top: 2px solid var(--border);
      margin: 14px 0;
    }

    a:link { color: var(--link); }
    a:visited { color: var(--visited); }
    a:hover { background: #ffff00; }

    .nav {
      margin: 0 0 10px 0;
      padding: 0;
      list-style: none;
    }
    .nav li {
      display: inline;
      margin-right: 10px;
    }

    .mono {
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
    }

    .post-date {
      margin: 0 0 14px 0;
    }

    .post-body h2,
    .post-body h3 {
      margin-bottom: 6px;
    }

    .post-body p {
      margin: 0 0 12px 0;
    }

    .box {
      border: 2px solid var(--border);
      padding: 10px;
      background: #f7f7f7;
    }

    footer {
      margin-top: 14px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>{{ page.title }}</h1>

    <ul class="nav" aria-label="Site links">
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/files/Jon_Huml_Resume.pdf' | relative_url }}">CV</a></li>
      <li><a href="{{ '/projects.html' | relative_url }}">Research</a></li>
      <li><a href="{{ '/blog.html' | relative_url }}">Blog</a></li>
      <li><a href="{{ '/gallery.html' | relative_url }}">Photos</a></li>
    </ul>

    <p class="mono post-date">{{ page.date | date: "%B %-d, %Y" }}</p>

    <hr />

    <article class="post-body box">
      {{ content }}
    </article>

    <footer>
      <hr />
      <div class="mono">
        <a href="{{ '/blog.html' | relative_url }}">Back to blog</a>
      </div>
    </footer>
  </div>
</body>
</html>
